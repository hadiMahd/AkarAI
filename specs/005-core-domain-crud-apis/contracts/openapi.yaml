openapi: 3.0.3
info:
  title: AkarAI Phase 4 Core Domain CRUD API
  version: 0.1.0
  description: >
    Contract for Phase 4 core domain database and CRUD APIs. This contract excludes
    AI search, RAG, image upload/processing, OCR, email sending, dashboards,
    chatbot behavior, buyer-to-agency real-time chat, spam classification,
    lead scoring, and generated replies.
servers:
  - url: http://localhost:8000
security:
  - bearerAuth: []
paths:
  /agencies/me/profile:
    get:
      summary: Get current agency profile
      tags: [Agencies]
      responses:
        "200": { description: Agency profile }
    put:
      summary: Update current agency profile
      tags: [Agencies]
      responses:
        "200": { description: Updated agency profile }
        "403": { description: Support employees cannot update agency profile }
  /agencies/me/employees:
    get:
      summary: List agency employees
      tags: [Agencies]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { description: Paginated employees }
    post:
      summary: Create agency employee
      tags: [Agencies]
      responses:
        "201": { description: Employee created }
        "403": { description: Support employees cannot manage employees }
  /agencies/me/employees/{employee_id}:
    get:
      summary: Get agency employee
      tags: [Agencies]
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      responses:
        "200": { description: Employee }
    patch:
      summary: Update agency employee
      tags: [Agencies]
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      responses:
        "200": { description: Employee updated }
        "403": { description: Support employees cannot manage employees }
    delete:
      summary: Deactivate agency employee
      tags: [Agencies]
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      responses:
        "204": { description: Employee deactivated }
  /agency/listings:
    get:
      summary: List tenant listings
      tags: [Agency Listings]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { description: Paginated tenant listings }
    post:
      summary: Create listing
      tags: [Agency Listings]
      responses:
        "201": { description: Listing created }
        "403": { description: Support employees cannot create listings }
  /agency/listings/{listing_id}:
    get:
      summary: Get tenant listing
      tags: [Agency Listings]
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "200": { description: Listing }
    patch:
      summary: Update tenant listing
      tags: [Agency Listings]
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "200": { description: Listing updated }
    delete:
      summary: Archive tenant listing
      tags: [Agency Listings]
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "204": { description: Listing archived }
  /agency/listings/{listing_id}/photos:
    get:
      summary: List listing photo metadata
      tags: [Agency Listings]
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "200": { description: Listing photo metadata }
    post:
      summary: Create listing photo metadata
      tags: [Agency Listings]
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "201": { description: Photo metadata created }
  /agency/listings/{listing_id}/viewing-slots:
    get:
      summary: List listing viewing slots
      tags: [Viewing Slots]
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "200": { description: Viewing slots }
    post:
      summary: Create listing viewing slot
      tags: [Viewing Slots]
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "201": { description: Viewing slot created }
        "403": { description: Support employees cannot create viewing slots unless explicitly granted later }
  /listings:
    get:
      summary: Public active listing search
      tags: [Public Listings]
      parameters:
        - name: location
          in: query
          schema: { type: string }
        - name: min_price
          in: query
          schema: { type: number }
        - name: max_price
          in: query
          schema: { type: number }
        - name: bedrooms
          in: query
          schema: { type: integer }
        - name: bathrooms
          in: query
          schema: { type: integer }
        - name: property_type
          in: query
          schema: { type: string }
        - name: listing_purpose
          in: query
          schema: { type: string }
        - name: furnishing
          in: query
          schema: { type: string }
        - name: min_area_size
          in: query
          schema: { type: number }
        - name: max_area_size
          in: query
          schema: { type: number }
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, price_asc, price_desc, area_size_asc, area_size_desc]
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { description: Paginated active listing results }
        "429": { description: Search rate limit exceeded }
  /listings/{listing_id}:
    get:
      summary: Public listing detail
      tags: [Public Listings]
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "200": { description: Active listing detail }
        "404": { description: Listing missing or not active }
  /me/saved-listings:
    get:
      summary: List my saved listings
      tags: [Saved Listings]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { description: Paginated saved listings }
  /me/saved-listings/{listing_id}:
    put:
      summary: Save listing
      tags: [Saved Listings]
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "200": { description: Listing saved }
    delete:
      summary: Unsave listing
      tags: [Saved Listings]
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "204": { description: Listing unsaved }
  /me/comparison-sessions:
    get:
      summary: List my comparison sessions
      tags: [Comparisons]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { description: Paginated comparison sessions }
    post:
      summary: Create comparison session
      tags: [Comparisons]
      responses:
        "201": { description: Comparison session created }
  /me/comparison-sessions/{session_id}:
    get:
      summary: Get comparison session
      tags: [Comparisons]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200": { description: Comparison session }
    patch:
      summary: Update comparison session
      tags: [Comparisons]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200": { description: Comparison session updated }
    delete:
      summary: Delete comparison session
      tags: [Comparisons]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "204": { description: Comparison session deleted }
  /me/comparison-sessions/{session_id}/items:
    post:
      summary: Add comparison item
      tags: [Comparisons]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "201": { description: Comparison item added }
        "409": { description: Comparison session already has four items }
  /listings/{listing_id}/inquiries:
    post:
      summary: Submit listing inquiry
      tags: [Leads]
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "201": { description: Lead created }
        "429": { description: Inquiry rate limit exceeded }
  /agency/leads:
    get:
      summary: List agency leads
      tags: [Leads]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { description: Paginated tenant leads }
  /agency/leads/{lead_id}:
    get:
      summary: Get agency lead
      tags: [Leads]
      parameters:
        - $ref: "#/components/parameters/LeadId"
      responses:
        "200": { description: Lead }
    patch:
      summary: Update agency lead status
      tags: [Leads]
      parameters:
        - $ref: "#/components/parameters/LeadId"
      responses:
        "200": { description: Lead updated }
  /agency/leads/{lead_id}/review:
    post:
      summary: Mark lead reviewed
      tags: [Leads]
      parameters:
        - $ref: "#/components/parameters/LeadId"
      responses:
        "201": { description: Reviewed lead record created }
  /listings/{listing_id}/viewings:
    post:
      summary: Schedule listing viewing
      tags: [Viewings]
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "201": { description: Scheduled viewing and initial status history created }
        "409": { description: Viewing slot unavailable }
        "429": { description: Viewing booking rate limit exceeded }
  /me/viewings:
    get:
      summary: List my scheduled viewings
      tags: [Viewings]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { description: Paginated user scheduled viewings }
  /me/viewings/{viewing_id}:
    get:
      summary: Get my scheduled viewing
      tags: [Viewings]
      parameters:
        - $ref: "#/components/parameters/ViewingId"
      responses:
        "200": { description: User scheduled viewing detail }
  /agency/viewings:
    get:
      summary: List agency scheduled viewings
      tags: [Viewings]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { description: Paginated tenant scheduled viewings }
  /agency/viewings/{viewing_id}:
    get:
      summary: Get agency scheduled viewing
      tags: [Viewings]
      parameters:
        - $ref: "#/components/parameters/ViewingId"
      responses:
        "200": { description: Tenant scheduled viewing detail }
    patch:
      summary: Update scheduled viewing status
      tags: [Viewings]
      parameters:
        - $ref: "#/components/parameters/ViewingId"
      responses:
        "200": { description: Scheduled viewing updated and status history appended }
  /notifications:
    get:
      summary: List notifications for current actor
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { description: Paginated notifications }
  /notifications/{notification_id}:
    get:
      summary: Get notification detail
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/NotificationId"
      responses:
        "200": { description: Notification detail }
  /notifications/{notification_id}/read:
    post:
      summary: Mark notification read
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/NotificationId"
      responses:
        "200": { description: Notification marked read }
  /notifications/{notification_id}/dismiss:
    post:
      summary: Dismiss notification
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/NotificationId"
      responses:
        "200": { description: Notification dismissed }
  /agency/search-logs:
    get:
      summary: List tenant search logs
      tags: [Operational Logs]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { description: Paginated tenant search logs }
  /agency/domain-logs:
    get:
      summary: List tenant domain event logs
      tags: [Operational Logs]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { description: Paginated tenant domain logs }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: page_size
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    ListingId:
      name: listing_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    LeadId:
      name: lead_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ViewingId:
      name: viewing_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    EmployeeId:
      name: employee_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    SessionId:
      name: session_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    NotificationId:
      name: notification_id
      in: path
      required: true
      schema: { type: string, format: uuid }
  schemas:
    ListingStatus:
      type: string
      enum: [active, inactive, archived]
    LeadStatus:
      type: string
      enum: [new, reviewed, closed]
    ScheduledViewingStatus:
      type: string
      enum: [scheduled, cancelled_by_user, cancelled_by_agency, completed, no_show]
    SortOption:
      type: string
      enum: [newest, price_asc, price_desc, area_size_asc, area_size_desc]
