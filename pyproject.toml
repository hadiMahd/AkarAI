[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
  "dump",
  "graphify-out",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
]
ignore = [
  "E501",
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/conftest.py" = ["E402"]
"workers/tests/conftest.py" = ["E402"]
"workers/tests/test_rag_ingestion.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
