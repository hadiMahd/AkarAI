name: akarai

services:
  # ── Backing Services ────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg17
    container_name: akarai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: akarai
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akarai -d akarai"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: akarai-pgbouncer
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: akarai
      DB_PASSWORD: akarai
      DB_NAME: akarai
      LISTEN_PORT: "6432"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "20"
      ADMIN_USERS: akarai
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:6432"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akarai -d akarai -h 127.0.0.1 -p 6432"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: akarai-redis
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: akarai-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./docker/pgadmin/pgpass:/pgpass:ro
      - pgadmindata:/var/lib/pgadmin
    ports:
      - "5050:80"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/misc/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio:
    image: minio/minio:latest
    container_name: akarai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-bootstrap:
    image: minio/mc:latest
    container_name: akarai-minio-bootstrap
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/rag-vault;
      mc mb --ignore-existing local/property-media;
      echo 'Bootstrap complete: rag-vault and property-media buckets created'
      "
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  # ── Vault (secret store for local dev) ─────────────────────────────

  vault:
    image: hashicorp/vault:latest
    container_name: akarai-vault
    entrypoint: vault
    command: server -dev -dev-root-token-id=root -dev-listen-address=0.0.0.0:8200
    ports:
      - "8200:8200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vault-init:
    build:
      context: ./vault
      dockerfile: Dockerfile
    container_name: akarai-vault-init
    volumes:
      - ./.env:/.env:ro
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      DOTENV_PATH: /.env
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"

  # ── Application Services ────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: akarai-backend
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      PROJECT_NAME: AkarAI
      BACKEND_HOST: "0.0.0.0"
      BACKEND_PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://akarai:akarai@pgbouncer:6432/akarai
      DATABASE_SYNC_URL: postgresql+psycopg2://akarai:akarai@pgbouncer:6432/akarai
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_SECURE: "false"
      MINIO_PUBLIC_URL: localhost:9000
      MINIO_BUCKET_RAG: rag-vault
      MINIO_BUCKET_MEDIA: property-media
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000","http://localhost:3001","http://127.0.0.1:3001","http://localhost:8501","http://127.0.0.1:8501"]'
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  user-app:
    build:
      context: ./apps/user
      dockerfile: Dockerfile
    container_name: akarai-user-app
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  agency-app:
    build:
      context: ./apps/agency
      dockerfile: Dockerfile
    container_name: akarai-agency-app
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3001:3001"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: akarai-admin
    environment:
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      BACKEND_URL: http://backend:8000
      APP_ENV: development
    ports:
      - "8501:8501"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    container_name: akarai-worker
    environment:
      APP_ENV: development
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://akarai:akarai@pgbouncer:6432/akarai
      RAG_FASTCDC_MIN_SIZE: "256"
      RAG_FASTCDC_AVG_SIZE: "768"
      RAG_FASTCDC_MAX_SIZE: "1536"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "workers/healthcheck.py"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  pgadmindata:
  redisdata:
  miniodata:
